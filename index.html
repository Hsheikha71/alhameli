<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صدقة جارية عن روح الوالد حمد الهاملي</title>
<style>
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background-color: #f4f6f8;
color: #333;
margin: 0;
padding: 0;
text-align: center;
}
header {
background-color: #1c3d5a;
color: white;
padding: 40px 20px;
}
header h1 {
margin: 0;
font-size: 2.5rem;
color: #f6ad55;
}
header p {
font-size: 1.3rem;
opacity: 0.9;
margin-top: 10px;
}
.container {
max-width: 700px;
margin: 40px auto;
padding: 30px;
background: white;
border-radius: 12px;
box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}
h2 {
color: #1c3d5a;
margin-top: 0;
}
.description {
font-size: 1.1rem;
color: #555;
line-height: 1.7;
margin-bottom: 25px;
}

/* Mosque Graphic Styling */
.mosque-image-container {
width: 100%;
max-width: 400px;
margin: 0 auto 25px auto;
background-color: #eef2f5;
border-radius: 8px;
padding: 10px;
border: 1px solid #e2e8f0;
}

/* QR Code Layout */
.qr-section {
margin: 30px auto;
padding: 20px;
background-color: #f8fafc;
border: 1px solid #e2e8f0;
border-radius: 12px;
max-width: 320px;
}
.qr-image {
width: 100%;
max-width: 250px;
height: auto;
border-radius: 8px;
box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
.qr-instruction {
margin-top: 12px;
font-size: 1.1rem;
color: #1c3d5a;
font-weight: bold;
}
